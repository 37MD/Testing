<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quick Commerce - Google Shopping Edition v5">
    <title>QC - Google Shopping Edition</title>

    <link rel="canonical" href="https://37md.github.io/QuickCommerce/" />
    <link rel="manifest" href="/QuickCommerce/manifest.json">
    <meta name="theme-color" content="#f4f0e6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QC Finder">
    <link rel="apple-touch-icon" href="/QuickCommerce/icon-192.png">

    <style>
        * {
            color: #000000 !important;
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
            font-weight: normal !important;
        }
        .main-title {
            font-weight: bold !important;
            font-size: 2.2em;
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #f4f0e6;
            padding: 25px;
            border: 1px solid #000;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }
        .form-section {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold !important;
        }
        .text-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #000;
            background-color: #e8e2d2;
        }
        .text-input::placeholder {
            color: #000 !important;
            opacity: 0.6;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-primary {
            padding: 12px 20px;
            background-color: #d1c8b4;
            border: 1px solid #000;
            cursor: pointer;
            flex: 1;
            min-width: 200px;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: bold !important;
        }
        .btn-primary:hover:not(:disabled) { background-color: #bab09d; }
        .btn-primary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            border-style: dashed;
        }
        
        /* Spinner CSS */
        .spinner {
            border: 3px solid #999;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }
        .btn-primary:disabled .spinner {
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .confirmation-panel {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border: 1px dashed #000;
            background-color: #e8e2d2;
        }

        .api-key-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #000;
            background-color: #e8e2d2;
        }
        .api-key-note {
            font-size: 0.85em;
            margin-top: 6px;
            opacity: 0.8;
        }

        .results-grid {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            display: none;
            background-color: #e8e2d2;
        }
        .results-grid th,
        .results-grid td {
            border: 1px solid #000;
            padding: 10px 12px;
            text-align: left;
            vertical-align: middle;
        }
        .results-grid th { background-color: #d1c8b4; font-weight: bold !important; }
        .results-grid tr:hover td { background-color: #f4f0e6; }

        .price-cell { font-weight: bold !important; }
        .price-real { color: #000 !important; }
        .price-na { color: #000 !important; font-style: italic; opacity: 0.7; }

        .deeplink-btn {
            display: inline-block;
            padding: 4px 10px;
            background-color: #d1c8b4;
            border: 1px solid #000;
            cursor: pointer;
            font-size: 0.85em;
            text-decoration: none;
            font-weight: bold !important;
        }
        .deeplink-btn:hover { background-color: #bab09d; }

        .status-msg {
            margin-top: 15px;
            padding: 10px;
            border-left: 4px solid #000;
            background-color: #d1c8b4;
            display: none;
            word-wrap: break-word;
            font-weight: bold !important;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid #000;
        }
        .results-title { font-weight: bold !important; font-size: 1.1em; }
    </style>
</head>
<body>

<main class="app-container">
    <h1 class="main-title">Google Shopping Scanner v5</h1>

    <div class="api-key-section">
        <label class="form-label">Gemini API Keys</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <div style="flex:1;min-width:200px;">
                <input type="password" id="geminiKey1" class="text-input" placeholder="Key 1 (Primary) - AIza..." autocomplete="off">
            </div>
            <div style="flex:1;min-width:200px;">
                <input type="password" id="geminiKey2" class="text-input" placeholder="Key 2 (Fallback) - AIza..." autocomplete="off">
            </div>
        </div>
        <p class="api-key-note">Model cascade (6 models × 2 keys, original loop): 3.5-flash → 3.1-flash-lite → 2.5-flash → 2.5-pro → 3-flash → 3.1-pro</p>
    </div>
    
    <section class="form-section">
        <label for="productUrl" class="form-label">Paste Product Link:</label>
        <input type="url" id="productUrl" class="text-input" placeholder="https://www.amazon.in/dp/...">
        <button type="button" id="decodeBtn" class="btn-primary" style="margin-top:10px;">
            <span class="spinner"></span><span class="btn-text">Decode Product Details</span>
        </button>
    </section>

    <section class="confirmation-panel" id="confirmationBox">
        <div class="form-section">
            <label for="productName" class="form-label">Target Product:</label>
            <input type="text" id="productName" class="text-input">
        </div>
        <div class="form-section">
            <label for="productSize" class="form-label">Size / Variant:</label>
            <input type="text" id="productSize" class="text-input">
        </div>
        <div style="margin-top:10px; font-weight:bold!important;">Location: Thane, 400615</div>
        <div class="button-group">
            <button type="button" id="confirmSearchBtn" class="btn-primary">
                <span class="spinner"></span><span class="btn-text">Scan Google Shopping</span>
            </button>
            <button type="button" id="scan8Btn" class="btn-primary">
                <span class="spinner"></span><span class="btn-text">Scan 8 Portals</span>
            </button>
        </div>
    </section>

    <div id="statusMsg" class="status-msg"></div>

    <div id="gsHeader" class="results-header" style="display:none;margin-top:30px;">
        <span class="results-title" id="gsTitle">Google Shopping Results</span>
    </div>
    <table class="results-grid" id="gsTable">
        <thead>
            <tr>
                <th>Store</th>
                <th>Product</th>
                <th>Size</th>
                <th>Price</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="gsBody"></tbody>
    </table>
</main>

<script>
"use strict";

const GoogleShoppingApp = (() => {

    // ── MODEL POOL (original working models first, then reference scanner models) ──
    const GEMINI_MODELS = [
        'gemini-3.5-flash',      // Original #1 — was working before
        'gemini-3.1-flash-lite', // Original #2 + reference #1
        'gemini-2.5-flash',      // Original #3
        'gemini-2.5-pro',        // Original #4
        'gemini-3-flash',        // Reference scanner mid
        'gemini-3.1-pro',        // Reference scanner pro
    ];

    const REGEX = {
        LABEL_SIZE: /(?:quantity|weight|size|net\s*content|pack\s*of|capacity|net\s*weight)[\s.:-]*(\d+(?:\.\d+)?\s*(?:kg|g|gm|ml|l|liter|litre|pc|pcs|pack|packet|gb|tb|inch|cm|oz|lb)(?:s)?)/i,
        GENERIC_SIZE: /(?:\b|_|-|\[|\()(\d+(?:\.\d+)?\s*[-_]?\s*(?:kg|g|gm|ml|l|liter|litre|pc|pcs|pack|packet|gb|tb|inch|cm|oz|lb)(?:s)?)(?![a-z])/i
    };

    const DOM = {
        geminiKey1:       () => document.getElementById('geminiKey1'),
        geminiKey2:       () => document.getElementById('geminiKey2'),
        urlInput:         () => document.getElementById('productUrl'),
        decodeBtn:        () => document.getElementById('decodeBtn'),
        confirmationBox:  () => document.getElementById('confirmationBox'),
        productName:      () => document.getElementById('productName'),
        productSize:      () => document.getElementById('productSize'),
        confirmSearchBtn: () => document.getElementById('confirmSearchBtn'),
        scan8Btn:         () => document.getElementById('scan8Btn'),
        statusMsg:        () => document.getElementById('statusMsg'),
        gsHeader:         () => document.getElementById('gsHeader'),
        gsTable:          () => document.getElementById('gsTable'),
        gsBody:           () => document.getElementById('gsBody'),
        gsTitle:          () => document.getElementById('gsTitle'),
    };

    window.lastGeminiError = null;

    function getGeminiKeys() {
        return [DOM.geminiKey1().value.trim(), DOM.geminiKey2().value.trim()].filter(Boolean);
    }

    function showStatus(msg) {
        const el = DOM.statusMsg();
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideStatus() { DOM.statusMsg().style.display = 'none'; }
    function formatSize(s) { return s.replace(/[-_]/g, ' ').toUpperCase().trim(); }

    function cleanProductName(rawName) {
        return decodeURIComponent(rawName).replace(/[-_]/g, ' ').replace(/\s+/g, ' ').trim()
            .replace(/\b\w/g, c => c.toUpperCase());
    }

    function isValidHtmlResponse(text) {
        return !text.toLowerCase().includes("captcha") && !text.toLowerCase().includes("bot protection") && text.length > 200;
    }

    function getCleanSearchString(name, size) {
        if (!name) return "";
        const sz = size && size !== "Standard" && !size.includes("Manual") && !size.includes("Scanning") ? ' ' + size : '';
        return (name + sz).trim();
    }

    function escapeHTML(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.innerText = String(str);
        return d.innerHTML;
    }
    
    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
    }

    async function fetchWithTimeout(url, ms = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), ms);
        try {
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (e) {
            clearTimeout(id);
            throw e;
        }
    }

    // ── ADVANCED JSON EXTRACTOR (STRIPS GOOGLE CITATIONS) ──
    function extractJSON(text) {
        if (!text) return [];
        
        // 1. Strip markdown
        let t = text.replace(/[`]{3}(?:json)?/gi, '').replace(/[`]{3}/g, '').trim();
        
        // 2. Strip Grounding Citations (e.g., [1], [1, 2]) which break standard JSON
        t = t.replace(/\[\d+(?:\s*,\s*\d+)*\]/g, '');
        
        // 3. Isolate Array
        const startIdx = t.indexOf('[');
        const endIdx = t.lastIndexOf(']');
        if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
            t = t.substring(startIdx, endIdx + 1);
        }
        
        try { 
            return JSON.parse(t); 
        } catch (e) {
            // Fix trailing commas
            try {
                let fixed = t.replace(/,\s*([\]}])/g, '$1');
                return JSON.parse(fixed);
            } catch (e2) {
                // Final bypass
                try {
                    return (new Function('return ' + t))();
                } catch (e3) {
                    console.error("JSON extraction failed on:\n", t);
                    return [];
                }
            }
        }
    }

    async function callGeminiWithSearch(prompt) {
        const keys = getGeminiKeys();
        if (!keys.length) {
            window.lastGeminiError = "No API keys provided.";
            return null;
        }
        
        window.lastGeminiError = null;

        for (const key of keys) {
            for (const model of GEMINI_MODELS) {
                let reqBody = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json", temperature: 0.1, maxOutputTokens: 1024 }
                };

                try {
                    let resp = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
                        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody) }
                    );

                    if (resp.status === 400) {
                        const errorData = await resp.json().catch(() => null);
                        if (errorData?.error?.message?.toLowerCase().includes("api key not valid")) {
                            window.lastGeminiError = "API key invalid.";
                            break;
                        }
                        if (!window.lastGeminiError) window.lastGeminiError = errorData?.error?.message || `HTTP 400 on ${model}`;
                        continue;
                    }

                    if (resp.status === 429 || resp.status === 503) {
                        resp.clone().json().then(e => console.warn(`Gemini 429/503 on ${model}: ${e?.error?.message || JSON.stringify(e)}`)).catch(() => {});
                        if (!window.lastGeminiError) window.lastGeminiError = `Rate limited on ${model}`;
                        continue;
                    }

                    if (!resp.ok) {
                        const errorData = await resp.json().catch(() => null);
                        if (errorData?.error?.message?.toLowerCase().includes("api key not valid")) {
                            window.lastGeminiError = "API key invalid.";
                            break;
                        }
                        if (!window.lastGeminiError) window.lastGeminiError = `[${model}] HTTP ${resp.status}: ${errorData?.error?.message || 'unknown'}`;
                        continue;
                    }

                    const d = await resp.json();
                    const parts = d?.candidates?.[0]?.content?.parts || [];
                    const text = parts.filter(p => p.text).map(p => p.text).join('\n').trim();
                    if (text) return text;
                } catch(e) {
                    window.lastGeminiError = e.message;
                    continue;
                }
            }
        }
        return null;
    }

    async function handleUrlDecode() {
        const urlInput = DOM.urlInput().value.trim();
        if (!urlInput) { alert("Please enter a valid URL."); return; }

        let finalUrl = urlInput;
        if (!/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;

        setLoadingState(true, DOM.decodeBtn(), 'Decode Product Details', 'Decoding...');
        let guessedProduct = "", guessedSize = "", needsBackup = false;

        try {
            const urlObj = new URL(finalUrl);
            const urlLower = finalUrl.toLowerCase();
            let rawName = "";

            const params = new URLSearchParams(urlObj.search);
            for (const [key, value] of params.entries()) {
                if (key.toLowerCase().includes('size') || key.toLowerCase().includes('weight')) {
                    const m = value.match(REGEX.GENERIC_SIZE);
                    if (m) guessedSize = formatSize(m[1]);
                }
            }

            const segs = urlObj.pathname.split('/').filter(Boolean);
            
            if (urlLower.includes("amazon.in") || urlLower.includes("amazon.com")) {
                let dpIndex = segs.indexOf('dp');
                if (dpIndex === -1) dpIndex = segs.indexOf('gp'); 
                if (dpIndex > 0) rawName = segs[dpIndex - 1]; 
                else if (segs.length > 0 && !segs[0].includes('dp')) rawName = segs[0];
            } else if (urlLower.includes("flipkart.com")) {
                const i = segs.indexOf('p');
                if (i > 0) rawName = segs[i - 1];
            } else if (urlLower.includes("blinkit.com")) {
                const i = segs.indexOf('prn');
                if (i >= 0 && i + 1 < segs.length) rawName = segs[i + 1];
            } else {
                for (const seg of segs) {
                    if (seg.length > 15 && !seg.includes('dp') && !seg.includes('item')) { rawName = seg; break; }
                }
            }

            if (!guessedSize) {
                const m = rawName.match(REGEX.GENERIC_SIZE) || finalUrl.match(REGEX.GENERIC_SIZE);
                if (m) { 
                    guessedSize = formatSize(m[1]); 
                    rawName = rawName.replace(m[0], ''); 
                }
                else guessedSize = "Standard";
            } else {
                const m = rawName.match(REGEX.GENERIC_SIZE);
                if (m) rawName = rawName.replace(m[0], '');
            }

            guessedProduct = (rawName && rawName.length > 3) ? cleanProductName(rawName) : "";
            if (!guessedProduct || guessedProduct.length < 4) needsBackup = true;

        } catch(e) { 
            needsBackup = true; 
        }

        DOM.confirmationBox().style.display = 'block';
        DOM.gsTable().style.display = 'none';
        DOM.gsHeader().style.display = 'none';
        hideStatus();

        try {
            if (needsBackup || guessedSize === "Standard") {
                await executeDeepScrape(finalUrl, guessedProduct, guessedSize, needsBackup);
            } else {
                DOM.productName().value = guessedProduct;
                DOM.productSize().value = guessedSize;
            }
        } catch (error) {
            DOM.productName().value = guessedProduct || "Manual Entry Needed";
            DOM.productSize().value = guessedSize || "Standard";
        } finally {
            setLoadingState(false, DOM.decodeBtn(), 'Decode Product Details', 'Decoding...');
        }
    }

    async function executeDeepScrape(url, currentProduct, currentSize, needsNameBackup) {
        DOM.productName().value = needsNameBackup ? "Scanning for name..." : currentProduct;
        DOM.productSize().value = currentSize === "Standard" ? "Scanning..." : currentSize;

        const fetchPromises = [
            fetchWithTimeout(`https://r.jina.ai/${encodeURIComponent(url)}`, 4000).then(r => r.ok ? r.text() : Promise.reject()),
            fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(url)}`, 4000).then(r => r.ok ? r.text() : Promise.reject()),
            fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, 4000).then(r => r.json()).then(d => d.contents || Promise.reject())
        ];

        try {
            const firstSuccessText = await Promise.any(fetchPromises);
            if (firstSuccessText && isValidHtmlResponse(firstSuccessText)) {
                if (firstSuccessText.includes("<html")) {
                    parseDomAndExtract(firstSuccessText, needsNameBackup, currentSize === "Standard");
                } else {
                    extractDetailsFromText(firstSuccessText, firstSuccessText, needsNameBackup, currentSize === "Standard");
                }
                return;
            }
        } catch (e) {}

        if (needsNameBackup) DOM.productName().value = "Enter product name manually";
        if (DOM.productSize().value.includes("Scanning")) DOM.productSize().value = "Standard";
    }

    function parseDomAndExtract(html, updateName, updateSize) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        let seoText = "";
        const og = doc.querySelector('meta[property="og:title"]');
        if (og) seoText += og.content + " ";
        doc.querySelectorAll('script[type="application/ld+json"]').forEach(s => {
            try { seoText += JSON.stringify(JSON.parse(s.innerText)) + " "; } catch(e) {}
        });
        const title = doc.querySelector('title')?.innerText || "";
        doc.querySelectorAll("script,style,noscript").forEach(s => s.remove());
        const body = doc.body?.textContent || "";
        extractDetailsFromText(seoText || title, seoText + " " + title + " " + body.substring(0, 5000), updateName, updateSize);
    }

    function extractDetailsFromText(primary, full, updateName, updateSize) {
        if (updateSize) {
            const m = full.match(REGEX.LABEL_SIZE) || primary.match(REGEX.GENERIC_SIZE) || full.match(REGEX.GENERIC_SIZE);
            DOM.productSize().value = m ? formatSize(m[1]) : "Standard";
        }
        if (updateName) {
            let lines = primary.split('\n').map(l => l.trim()).filter(l => l.length > 5 && !l.startsWith('http') && !l.toLowerCase().includes('captcha'));
            let t = lines[0] || "";
            
            t = t.replace(/^Title\s+|Amazon\.in: Buy|Amazon\.in:|Flipkart\.com|Blinkit|Buy/ig, '').trim();
            const sz = DOM.productSize().value;
            
            if (sz && !sz.includes("Standard")) {
                try {
                    const safeSz = escapeRegExp(sz).replace(/\\s\+/g, '\\s*');
                    t = t.replace(new RegExp(safeSz, 'i'), '').trim();
                } catch(e) {}
            }
            DOM.productName().value = t.replace(/^[-|\s\[\(]+|[-|\s\]\)]+$/g, '').replace(/[\{\}\"\'\:\,\_]/g, ' ').replace(/\s+/g, ' ').trim();
        }
    }

    async function openGoogleShopping() {
        const productName = DOM.productName().value.trim();
        const productSize = DOM.productSize().value.trim();
        if (!productName) { alert("Please enter Product Name."); return; }
        
        const searchStr = getCleanSearchString(productName, productSize);
        const keys = getGeminiKeys();
        if (!keys.length) {
            showStatus('No Gemini keys saved. Add API key above.');
            return;
        }
        
        const btn = DOM.confirmSearchBtn();
        setLoadingState(true, btn, 'Scan Google Shopping', 'Searching Google...');
        DOM.gsTable().style.display = 'none';
        DOM.gsHeader().style.display = 'none';
        showStatus('Scanning Google Shopping for "' + searchStr + '"...');

        try {
            const prompt = `Provide current pricing for "${searchStr}" sold in India near Thane 400615.
Return results ONLY from these stores: Amazon Now, Flipkart Minutes, Blinkit, BigBasket, Instamart, Zepto, DMart, JioMart. Ignore all other sellers.
Return ONLY a pure JSON array. Format:
[{"seller":"<store>","name":"<product name>","size":"<size>","price":<integer>,"mrp":<integer or null>,"url":"<url or null>"}]`;

            const result = await callGeminiWithSearch(prompt);
            
            if (!result) { 
                const errorDetails = window.lastGeminiError ? ` — ${window.lastGeminiError}` : '';
                showStatus('❌ Could not fetch results.' + errorDetails); 
                return; 
            }

            let items = extractJSON(result);

            if (!items || !items.length) { 
                showStatus('No Google Shopping results found. Gemini returned unexpected data.'); 
                return; 
            }

            const tbody = DOM.gsBody();
            tbody.innerHTML = '';
            items.forEach(item => {
                const tr = document.createElement('tr');
                const priceHtml = item.price
                    ? `<span class="price-cell price-real">Rs. ${item.price}</span>` + (item.mrp && item.mrp > item.price ? ` <small style="text-decoration:line-through;opacity:0.6;">Rs. ${item.mrp}</small>` : '')
                    : `<span class="price-na">--</span>`;
                const linkHtml = item.url
                    ? `<a href="${escapeHTML(item.url)}" target="_blank" class="deeplink-btn">View</a>`
                    : `<span class="price-na">--</span>`;
                tr.innerHTML =
                    `<td>${escapeHTML(item.seller   || '--')}</td>` +
                    `<td>${escapeHTML(item.name     || '--')}</td>` +
                    `<td>${escapeHTML(item.size     || productSize || '--')}</td>` +
                    `<td>${priceHtml}</td>` +
                    `<td>${linkHtml}</td>`;
                tbody.appendChild(tr);
            });
            DOM.gsTitle().textContent = `Google Shopping: "${searchStr}"`;
            DOM.gsHeader().style.display = 'flex';
            DOM.gsTable().style.display = 'table';
            hideStatus();
            showStatus('Google Shopping scan complete (' + items.length + ' results)');
            
        } catch (error) {
            showStatus('An unexpected error occurred.');
        } finally {
            setLoadingState(false, btn, 'Scan Google Shopping', 'Searching Google...');
        }
    }

    const PORTALS = ['Amazon Now','Flipkart Minutes','Blinkit','BigBasket','Instamart','Zepto','DMart','JioMart'];

    async function scan8Portals() {
        const productName = DOM.productName().value.trim();
        const productSize = DOM.productSize().value.trim();
        if (!productName) { alert("Please enter Product Name."); return; }

        const searchStr = getCleanSearchString(productName, productSize);
        const keys = getGeminiKeys();
        if (!keys.length) { showStatus('No Gemini keys saved. Add API key above.'); return; }

        const btn = DOM.scan8Btn();
        const mainBtn = DOM.confirmSearchBtn();
        btn.disabled = true;
        mainBtn.disabled = true;
        const textSpan = btn.querySelector('.btn-text');

        const tbody = DOM.gsBody();
        tbody.innerHTML = '';
        DOM.gsTitle().textContent = `8-Portal Scan: "${searchStr}"`;
        DOM.gsHeader().style.display = 'flex';
        DOM.gsTable().style.display = 'table';

        let found = 0;

        for (let i = 0; i < PORTALS.length; i++) {
            const portal = PORTALS[i];
            if (textSpan) textSpan.textContent = ` Scanning ${i+1}/8: ${portal}...`;
            showStatus(`Scanning ${portal} (${i+1} of 8)...`);

            const placeholderRow = document.createElement('tr');
            placeholderRow.id = `portal-row-${i}`;
            placeholderRow.innerHTML = `<td>${escapeHTML(portal)}</td><td colspan="4" style="opacity:0.5;font-style:italic;">Searching...</td>`;
            tbody.appendChild(placeholderRow);

            const prompt = `Provide current pricing for "${searchStr}" sold by ${portal} in India near Thane 400615.
Return ONLY 1 result from ${portal}. If not listed on ${portal}, return an empty array [].
Return ONLY a pure JSON array. Format:
[{"seller":"${portal}","name":"<product name>","size":"<size>","price":<integer>,"mrp":<integer or null>,"url":"<url or null>"}]`;

            try {
                const result = await callGeminiWithSearch(prompt);
                const items = result ? extractJSON(result) : [];
                const item = items && items.length ? items[0] : null;
                const price = item ? parseInt(item.price) : 0;

                const row = document.getElementById(`portal-row-${i}`);
                if (row) {
                    if (item && price > 0) {
                        found++;
                        const priceHtml = `<span class="price-cell price-real">Rs. ${price}</span>` +
                            (item.mrp && parseInt(item.mrp) > price ? ` <small style="text-decoration:line-through;opacity:0.6;">Rs. ${parseInt(item.mrp)}</small>` : '');
                        const linkHtml = item.url
                            ? `<a href="${escapeHTML(item.url)}" target="_blank" class="deeplink-btn">View</a>`
                            : `<span class="price-na">--</span>`;
                        row.innerHTML =
                            `<td>${escapeHTML(portal)}</td>` +
                            `<td>${escapeHTML(item.name || '--')}</td>` +
                            `<td>${escapeHTML(item.size || productSize || '--')}</td>` +
                            `<td>${priceHtml}</td>` +
                            `<td>${linkHtml}</td>`;
                    } else {
                        row.remove();
                    }
                }
            } catch(e) {
                const row = document.getElementById(`portal-row-${i}`);
                if (row) row.remove();
            }
        }

        btn.disabled = false;
        mainBtn.disabled = false;
        if (textSpan) textSpan.textContent = ' Scan 8 Portals';
        showStatus(`8-Portal scan complete — ${found} of 8 portals listed.`);
    }

    function setLoadingState(isScanning, buttonElement, idleText, scanningText) {
        if (!buttonElement) return;
        buttonElement.disabled = isScanning;
        const textSpan = buttonElement.querySelector('.btn-text');
        if (textSpan) {
            textSpan.textContent = isScanning ? ` ${scanningText}` : ` ${idleText}`;
        }
    }

    function init() {
        DOM.decodeBtn().addEventListener('click', handleUrlDecode);
        DOM.confirmSearchBtn().addEventListener('click', openGoogleShopping);
        DOM.scan8Btn().addEventListener('click', scan8Portals);

        const gk1 = localStorage.getItem('gemini_key_1');
        const gk2 = localStorage.getItem('gemini_key_2');
        if (gk1) DOM.geminiKey1().value = gk1;
        if (gk2) DOM.geminiKey2().value = gk2;

        DOM.geminiKey1().addEventListener('input', () => {
            const k = DOM.geminiKey1().value.trim();
            if (k) localStorage.setItem('gemini_key_1', k);
            else localStorage.removeItem('gemini_key_1');
        });
        
        DOM.geminiKey2().addEventListener('input', () => {
            const k = DOM.geminiKey2().value.trim();
            if (k) localStorage.setItem('gemini_key_2', k);
            else localStorage.removeItem('gemini_key_2');
        });
    }

    return { init };
})();

document.addEventListener("DOMContentLoaded", GoogleShoppingApp.init);
</script>
</body>

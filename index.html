<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quick Commerce Price Finder for Thane region">
    <title>Quick Commerce Finder</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#cccccc">
    
    <style>
        /* * GLOBAL STYLES
         * Strictly adhering to black font requirement. No white text permitted.
         */
        * {
            color: #000000 !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .app-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: #e0e0e0;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #cccccc;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .nav-tabs {
            display: flex;
            border-bottom: 2px solid #000000;
            margin-bottom: 25px;
        }

        .tab-item {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #d0d0d0;
            border: 1px solid #000000;
            border-bottom: none;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
        }

        .tab-item.active {
            background-color: #e0e0e0;
            border-top: 3px solid #000000;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .text-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #000000;
            background-color: #f9f9f9;
            border-radius: 4px;
        }

        .text-input::placeholder {
            color: #000000 !important;
            opacity: 0.6;
        }

        .btn-primary {
            padding: 12px 20px;
            background-color: #cccccc;
            border: 2px solid #000000;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #bbbbbb;
        }

        .btn-primary:disabled {
            background-color: #999999;
            cursor: not-allowed;
            border-style: dashed;
        }

        .confirmation-panel {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border: 1px dashed #000000;
            background-color: #d9d9d9;
            border-radius: 4px;
        }

        .location-badge {
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 15px;
            padding: 8px;
            background-color: #cccccc;
            border-left: 4px solid #000000;
        }

        .results-grid {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            display: none;
            background-color: #f9f9f9;
        }

        .results-grid th, 
        .results-grid td {
            border: 1px solid #000000;
            padding: 12px;
            text-align: left;
        }

        .results-grid th {
            background-color: #cccccc;
            font-weight: bold;
        }
    </style>
</head>
<body>

<main class="app-container">
    <header class="nav-tabs">
        <div class="tab-item active">Google Shopping TAB</div>
    </header>

    <section class="form-section">
        <label for="productUrl" class="form-label">Paste Shopping Portal Link (Amazon, Flipkart, Blinkit):</label>
        <input type="url" id="productUrl" class="text-input" placeholder="https://www.amazon.in/dp/B08L5WHFT9" aria-label="Product URL">
        <button id="decodeBtn" class="btn-primary">Decode URL</button>
    </section>

    <section class="confirmation-panel" id="confirmationBox" aria-live="polite">
        <h3>Confirm Product Details</h3>
        
        <div class="form-section">
            <label for="productName" class="form-label">Product Name:</label>
            <input type="text" id="productName" class="text-input" aria-label="Decoded Product Name">
        </div>
        
        <div class="form-section">
            <label for="productSize" class="form-label">Size / Variant:</label>
            <input type="text" id="productSize" class="text-input" aria-label="Decoded Product Size">
        </div>
        
        <div class="location-badge">Target Location: Thane, 400615</div>
        <button id="confirmSearchBtn" class="btn-primary">Confirm & Search in Quick Commerce</button>
    </section>

    <table class="results-grid" id="resultsTable">
        <thead>
            <tr>
                <th>Portal Name</th>
                <th>Product Name</th>
                <th>Size</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            </tbody>
    </table>
</main>

<script>
    "use strict";

    const QuickCommerceApp = (() => {
        const REGEX = {
            LABEL_SIZE: /(?:quantity|weight|size|net\s*content|pack\s*of|capacity|net\s*weight)[\s.:-]*(\d+(?:\.\d+)?\s*(?:kg|g|gm|ml|l|liter|litre|pc|pcs|pack|packet|gb|tb|inch|cm|oz|lb)(?:s)?)/i,
            GENERIC_SIZE: /(?:\b|_|-|\[|\()(\d+(?:\.\d+)?\s*[-_]?\s*(?:kg|g|gm|ml|l|liter|litre|pc|pcs|pack|packet|gb|tb|inch|cm|oz|lb)(?:s)?)(?![a-z])/i
        };

        const TARGET_PORTALS = [
            "Zepto", "Instamart", "DMart Ready", "Amazon NOW", 
            "Flipkart Minutes", "Blinkit", "Starquik", "Bigbasket", "Jiomart"
        ];

        const DOM = {
            urlInput: document.getElementById('productUrl'),
            decodeBtn: document.getElementById('decodeBtn'),
            confirmationBox: document.getElementById('confirmationBox'),
            productName: document.getElementById('productName'),
            productSize: document.getElementById('productSize'),
            confirmSearchBtn: document.getElementById('confirmSearchBtn'),
            resultsTable: document.getElementById('resultsTable'),
            resultsBody: document.getElementById('resultsBody')
        };

        async function handleUrlDecode() {
            const urlInput = DOM.urlInput.value.trim();
            
            if (!urlInput) {
                alert("Please enter a valid URL.");
                return;
            }

            setLoadingState(true);
            
            let guessedProduct = "";
            let guessedSize = "";
            let needsBackup = false;

            try {
                const urlObj = new URL(urlInput);
                const urlLower = urlInput.toLowerCase();
                let rawName = "";

                const params = new URLSearchParams(urlObj.search);
                for (const [key, value] of params.entries()) {
                    if (key.toLowerCase().includes('size') || key.toLowerCase().includes('weight')) {
                        let paramMatch = value.match(REGEX.GENERIC_SIZE);
                        if (paramMatch) {
                            guessedSize = formatSize(paramMatch[1]);
                        }
                    }
                }

                const pathSegments = urlObj.pathname.split('/').filter(Boolean); 
                
                if (urlLower.includes("amazon.in") || urlLower.includes("amazon.com")) {
                    const dpIndex = pathSegments.indexOf('dp');
                    if (dpIndex > 0) rawName = pathSegments[dpIndex - 1];
                } 
                else if (urlLower.includes("flipkart.com")) {
                    const pIndex = pathSegments.indexOf('p');
                    if (pIndex > 0) rawName = pathSegments[pIndex - 1];
                } 
                else if (urlLower.includes("blinkit.com")) {
                    const prnIndex = pathSegments.indexOf('prn');
                    if (prnIndex >= 0 && prnIndex + 1 < pathSegments.length) {
                        rawName = pathSegments[prnIndex + 1];
                    }
                } 
                else {
                    for (let segment of pathSegments) {
                        if (segment.length > 15 && !segment.includes('dp') && !segment.includes('item')) {
                            rawName = segment;
                            break;
                        }
                    }
                }

                if (!guessedSize) {
                    let sizeMatch = rawName.match(REGEX.GENERIC_SIZE) || urlInput.match(REGEX.GENERIC_SIZE);
                    if (sizeMatch) {
                        guessedSize = formatSize(sizeMatch[1]);
                        rawName = rawName.replace(sizeMatch[0], ''); 
                    } else {
                        guessedSize = "Standard";
                    }
                } else {
                    let nameSizeMatch = rawName.match(REGEX.GENERIC_SIZE);
                    if (nameSizeMatch) rawName = rawName.replace(nameSizeMatch[0], '');
                }

                if (rawName && rawName.length > 3) {
                    guessedProduct = cleanProductName(rawName);
                } else {
                    needsBackup = true;
                }
            } catch (e) {
                needsBackup = true;
            }

            DOM.confirmationBox.style.display = 'block';
            DOM.resultsTable.style.display = 'none';

            if (needsBackup || guessedSize === "Standard") {
                await executeDeepScrape(urlInput, guessedProduct, guessedSize, needsBackup);
            } else {
                DOM.productName.value = guessedProduct;
                DOM.productSize.value = guessedSize;
            }

            setLoadingState(false);
        }

        async function executeDeepScrape(url, currentProduct, currentSize, needsNameBackup) {
            DOM.productName.value = needsNameBackup ? "Fetching product name..." : currentProduct;
            DOM.productSize.value = currentSize === "Standard" ? "Scanning page tags for size..." : currentSize;
            
            let htmlFetched = false;
            let pageHtml = "";

            try {
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                if (response.ok) {
                    pageHtml = await response.text();
                    if (isValidHtmlResponse(pageHtml)) htmlFetched = true;
                }
            } catch (err) {}

            if (!htmlFetched) {
                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    if (data.contents && isValidHtmlResponse(data.contents)) {
                        pageHtml = data.contents;
                        htmlFetched = true;
                    }
                } catch (err) {}
            }

            if (!htmlFetched) {
                try {
                    const response = await fetch(`https://r.jina.ai/${encodeURIComponent(url)}`);
                    if (response.ok) {
                        const jinaText = await response.text();
                        if (jinaText && !jinaText.toLowerCase().includes("captcha")) {
                            extractDetailsFromText(jinaText, jinaText, needsNameBackup, currentSize === "Standard");
                            htmlFetched = true;
                        }
                    }
                } catch (err) {}
            }

            if (htmlFetched && pageHtml.includes("<html")) {
                parseDomAndExtract(pageHtml, needsNameBackup, currentSize === "Standard");
            } else if (!htmlFetched) {
                handleScrapeFailure(needsNameBackup);
            }
        }

        function parseDomAndExtract(htmlString, updateName, updateSize) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, "text/html");
            let seoText = "";
            
            const ogTitle = doc.querySelector('meta[property="og:title"]');
            if (ogTitle) seoText += ogTitle.content + " ";
            
            const jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
            jsonLdScripts.forEach(script => {
                try {
                    const data = JSON.parse(script.innerText);
                    const searchJson = (obj) => {
                        for (let k in obj) {
                            if (['name', 'description', 'weight'].includes(k)) seoText += obj[k] + " ";
                            else if (typeof obj[k] === 'object' && obj[k] !== null) searchJson(obj[k]);
                        }
                    };
                    searchJson(data);
                } catch(e) {}
            });

            const pageTitle = doc.querySelector('title') ? doc.querySelector('title').innerText : "";
            
            doc.querySelectorAll("script, style, noscript").forEach(s => s.remove());
            const pageText = doc.body ? doc.body.textContent : "";

            const combinedText = seoText + " " + pageTitle + " " + pageText;
            extractDetailsFromText(seoText || pageTitle, combinedText, updateName, updateSize);
        }

        function extractDetailsFromText(primaryText, fullText, updateName, updateSize) {
            if (updateSize) {
                let sizeMatch = fullText.match(REGEX.LABEL_SIZE) || 
                                primaryText.match(REGEX.GENERIC_SIZE) || 
                                fullText.match(REGEX.GENERIC_SIZE);
                
                DOM.productSize.value = sizeMatch ? formatSize(sizeMatch[1]) : "Standard (Not found)";
            }

            if (updateName) {
                const lines = primaryText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                let titleStr = (lines[0] || "").replace(/^#+\s*/, ''); 

                titleStr = titleStr.replace(/Amazon\.in: Buy|Amazon\.in:|Flipkart\.com|Blinkit|Buy/ig, '').trim();
                
                const currentSize = DOM.productSize.value;
                if (currentSize && !currentSize.includes("Standard")) {
                    const sizeStripper = new RegExp(currentSize.replace(/\s+/g, '\\s*'), 'i');
                    titleStr = titleStr.replace(sizeStripper, '').trim();
                }
                
                titleStr = titleStr.replace(/^[-|\s\[\(]+|[-|\s\]\)]+$/g, '');
                DOM.productName.value = titleStr;
            }
        }

        function simulateApiSearch() {
            const productName = DOM.productName.value.trim();
            const productSize = DOM.productSize.value.trim();

            if (!productName || !productSize) {
                alert("Please ensure both Product Name and Size are filled.");
                return;
            }

            DOM.confirmSearchBtn.innerText = "Searching Platforms...";
            DOM.confirmSearchBtn.disabled = true;

            setTimeout(() => {
                const mockResults = TARGET_PORTALS.map(portal => {
                    const basePrice = Math.floor(Math.random() * 220) + 30;
                    return {
                        portal: portal,
                        name: productName,
                        size: productSize,
                        price: "₹" + basePrice
                    };
                });

                renderResultsTable(mockResults);
                
                DOM.confirmSearchBtn.innerText = "Confirm & Search in Quick Commerce";
                DOM.confirmSearchBtn.disabled = false;
            }, 1800);
        }

        function renderResultsTable(results) {
            DOM.resultsBody.innerHTML = '';

            results.forEach(item => {
                const row = document.createElement('tr');
                
                const htmlString = "<td>" + escapeHTML(item.portal) + "</td>" +
                                   "<td>" + escapeHTML(item.name) + "</td>" +
                                   "<td>" + escapeHTML(item.size) + "</td>" +
                                   "<td><strong>" + escapeHTML(item.price) + "</strong></td>";
                
                row.innerHTML = htmlString;
                DOM.resultsBody.appendChild(row);
            });

            DOM.resultsTable.style.display = 'table';
        }

        function formatSize(sizeStr) {
            return sizeStr.replace(/[-_]/g, ' ').toUpperCase().trim();
        }

        function cleanProductName(rawName) {
            let cleaned = decodeURIComponent(rawName).replace(/[-_]/g, ' ').replace(/\s+/g, ' ').trim();
            return cleaned.replace(/\b\w/g, char => char.toUpperCase());
        }

        function isValidHtmlResponse(text) {
            const lowerText = text.toLowerCase();
            return !lowerText.includes("captcha") && !lowerText.includes("bot protection");
        }

        function handleScrapeFailure(needsNameBackup) {
            if (needsNameBackup) {
                DOM.productName.value = "Scrapers blocked by portal. Enter manually.";
            }
            if (DOM.productSize.value.includes("Scanning")) {
                DOM.productSize.value = "Standard (Manual entry needed)";
            }
        }

        function setLoadingState(isLoading) {
            DOM.decodeBtn.disabled = isLoading;
            DOM.decodeBtn.innerText = isLoading ? "Decoding..." : "Decode URL";
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }
        
        function init() {
            DOM.decodeBtn.addEventListener('click', handleUrlDecode);
            DOM.confirmSearchBtn.addEventListener('click', simulateApiSearch);
        }

        return { init };
    })();

    document.addEventListener("DOMContentLoaded", QuickCommerceApp.init);

    // ==========================================
    // PWA SERVICE WORKER REGISTRATION
    // ==========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful');
                })
                .catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
        });
    }
</script>
</body>
</html>

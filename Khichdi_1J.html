<script>
  // ==========================================
  // LANDSCAPE/FULLSCREEN HANDLER
  // ==========================================
  function makeLandscape() {
    var videoEl = document.querySelector('.reader-video-embed');
    if (videoEl) {
      if (videoEl.requestFullscreen) {
        videoEl.requestFullscreen().then(function() {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(function(e) { console.log(e); });
          }
        }).catch(function(e) { console.log(e); });
      } else if (videoEl.webkitRequestFullscreen) {
        videoEl.webkitRequestFullscreen();
      } else if (videoEl.msRequestFullscreen) {
        videoEl.msRequestFullscreen();
      }
    }
  }

  // ==========================================
  // YOUTUBE SERIES FETCH LOGIC
  // ==========================================
  function fetchSeriesEpisodes() {
    const url = document.getElementById('series-tracker-input').value.trim();
    if (!url) {
      alert("Please paste a valid YouTube Playlist or Channel link.");
      return;
    }
    
    let rssUrl = '';
    const playlistMatch = url.match(/[?&]list=([^&]+)/);
    if (playlistMatch) {
      rssUrl = 'https://www.youtube.com/feeds/videos.xml?playlist_id=' + playlistMatch[1];
    } else if (url.includes('channel/')) {
      const channelMatch = url.match(/channel\/([^/?]+)/);
      if (channelMatch) {
        rssUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelMatch[1];
      }
    } else if (url.includes('user/')) {
      const userMatch = url.match(/user\/([^/?]+)/);
      if (userMatch) {
        rssUrl = 'https://www.youtube.com/feeds/videos.xml?user=' + userMatch[1];
      }
    } else if (url.includes('@')) {
       alert("Please use a Playlist Link (contains 'list=...') or Channel ID link instead of a handle (@name).");
       return;
    } else {
      alert("Could not recognize playlist or channel ID from the link. Please ensure it's a valid YouTube playlist or channel URL.");
      return;
    }

    const resultsGrid = document.getElementById('series-results-grid');
    resultsGrid.innerHTML = '<p class="loading">Fetching episodes...</p>';

    fetch(rss2jsonUrl + encodeURIComponent(rssUrl))
      .then(response => response.json())
      .then(data => {
        if (data.status !== 'ok') {
          resultsGrid.innerHTML = '<p style="font-weight:bold; text-align:center;">Could not fetch episodes. The publisher may have restricted access.</p>';
          return;
        }
        
        let html = '<h3 style="margin-top:0; padding-bottom:10px; border-bottom:2px solid #000; font-size:16px;">&#127902; ' + data.feed.title + '</h3>';
        
        // Filter out rss2json injected ad/promo items (they don't link to youtube.com)
        const cleanItems = data.items.filter(item => item.link && item.link.includes('youtube.com'));
        
        cleanItems.forEach(item => {
          const safeTitle = item.title.replace(/"/g, '&quot;');
          html += '<div class="feed-item" style="margin-bottom: 15px; padding-bottom: 15px;">' +
              '<span class="headline reader-trigger" data-url="' + item.link + '" data-title="' + safeTitle + '" data-feed="' + data.feed.title + '" data-date="' + item.pubDate + '" data-isyoutube="true">' + item.title + '</span>' +
              '<div class="meta" style="margin-top:8px;">' +
                '<span>' + new Date(item.pubDate).toLocaleDateString() + '</span>' +
              '</div>' +
            '</div>';
        });
        
        resultsGrid.innerHTML = html;
      })
      .catch(error => {
        resultsGrid.innerHTML = '<p style="font-weight:bold; text-align:center;">Error fetching data. Check your network connection.</p>';
      });
  }

  // ==========================================
  // TRAVEL DISCOVERY LOGIC
  // ==========================================
  function searchTravel(type) {
    const query = document.getElementById('travel-search-input').value.trim();
    if (!query) {
      alert("Please enter a destination name first.");
      return;
    }
    
    // Add "India" to the search term to ensure relevant results
    const encodedQuery = encodeURIComponent(query + " tourism India");
    let url = "";
    
    if (type === 'photos') {
      // Direct link to Google Images
      url = "https://www.google.com/search?tbm=isch&q=" + encodedQuery;
    } else if (type === 'youtube') {
      // Direct link to YouTube Video Search for Travel Vlogs
      url = "https://www.youtube.com/results?search_query=" + encodedQuery + "+travel+vlog";
    }
    
    window.open(url, '_blank');
  }

  // ==========================================
  // SHOPPING — UPGRADED (1J)
  // ==========================================

  // ---- Wishlist (localStorage) ----
  var _wishlist = JSON.parse(localStorage.getItem('khichdi_wishlist') || '[]');

  function saveWishlist() {
    localStorage.setItem('khichdi_wishlist', JSON.stringify(_wishlist));
  }

  function addToWishlist() {
    var name = document.getElementById('wish-name').value.trim();
    var note = document.getElementById('wish-note').value.trim();
    if (!name) { alert('Please enter a product name.'); return; }
    _wishlist.unshift({ id: Date.now(), name: name, note: note, added: new Date().toLocaleDateString('en-IN') });
    saveWishlist();
    renderWishlist();
    document.getElementById('wish-name').value = '';
    document.getElementById('wish-note').value = '';
  }

  function removeWishItem(id) {
    _wishlist = _wishlist.filter(function(w) { return w.id !== id; });
    saveWishlist();
    renderWishlist();
  }

  function searchWishItem(name, portal) {
    var encoded = encodeURIComponent(name);
    var urls = {
      amazon:   'https://www.amazon.in/s?k=' + encoded,
      flipkart: 'https://www.flipkart.com/search?q=' + encoded,
      meesho:   'https://www.meesho.com/search?q=' + encoded,

  function shopCompare() {

    var enc = encodeURIComponent(q);
    window.open('https://www.amazon.in/s?k=' + enc, '_blank');

  // ---- Price History ----
  function checkPriceHistory() {
    var input = document.getElementById('shop-q').value.trim();
    if (!input) { alert('Enter a product name or paste a URL first.'); return; }
    var isUrl = /^https?:\/\//.test(input);
    if (isUrl) {
      if (input.includes('amazon.in')) {
        window.open('https://in.camelcamelcamel.com/search?sq=' + encodeURIComponent(input), '_blank');
      } else {
        window.open('https://pricehistoryapp.com/search?q=' + encodeURIComponent(input), '_blank');
      }
    } else {
      window.open('https://in.camelcamelcamel.com/search?sq=' + encodeURIComponent(input), '_blank');
      setTimeout(function() { window.open('https://www.google.com/search?tbm=shop&q=' + encodeURIComponent(input) + '+price+history+India', '_blank'); }, 400);
    }
  }

  // ---- Shopping tab switcher ----
  function shopTab(tab) {
    ['shop-tab-search','shop-tab-wishlist','shop-tab-deals','shop-tab-cashback'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    ['stb-search','stb-wishlist','stb-deals','stb-cashback'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) { el.style.background = '#e0e1dd'; el.style.borderBottom = '2px solid #000'; }
    });
    var show = document.getElementById('shop-tab-' + tab);
    if (show) show.style.display = 'block';
    var activeBtn = document.getElementById('stb-' + tab);
    if (activeBtn) { activeBtn.style.background = '#e9c46a'; activeBtn.style.borderBottom = '3px solid #000'; }
  }

  let readArticles = JSON.parse(localStorage.getItem('readArticles')) || [];
  let savedArticles = JSON.parse(localStorage.getItem('savedArticles')) || [];
  const BATCH_SIZE = 25;
  const feedPageState = {};

  function markAsRead(link) {
    if (!readArticles.includes(link)) {
      readArticles.push(link);
      localStorage.setItem('readArticles', JSON.stringify(readArticles));
    }
    const cardElement = document.querySelector(`.card[data-link="${link}"]`);
    if (cardElement) {
      cardElement.style.display = 'none';
    }
  }

  function saveArticle(articleDataStr) {
    const article = JSON.parse(decodeURIComponent(articleDataStr));
    if (!savedArticles.find(a => a.link === article.link)) {
      savedArticles.push(article);
      localStorage.setItem('savedArticles', JSON.stringify(savedArticles));
    }
    markAsRead(article.link);
    renderSavedSection();
  }

  function unsaveArticle(link) {
    savedArticles = savedArticles.filter(a => a.link !== link);
    localStorage.setItem('savedArticles', JSON.stringify(savedArticles));
    renderSavedSection();
  }

  function resetHistory() {
    if (confirm("This will un-hide all previously read articles. Continue?")) {
      localStorage.removeItem('readArticles');
      location.reload();
    }
  }

  // ==========================================
  function renderSavedSection() {
    const savedSection = document.getElementById('saved-section');
    const savedGrid = document.getElementById('saved-grid');
    savedGrid.innerHTML = '';

    if (savedArticles.length === 0) {
      savedSection.style.display = 'none';
      return;
    }

    savedSection.style.display = 'block';

    savedArticles.forEach(article => {
      const feedItem = document.createElement('div');
      feedItem.className = 'feed-item';
      
      const safeTitle = article.title.replace(/"/g, '&quot;');
      feedItem.innerHTML = `
        <span class="headline reader-trigger" data-url="${article.link}" data-title="${safeTitle}" data-feed="Saved" data-date="">${article.title}</span>
        <p class="description">${article.summary}</p>
        <div class="meta">
          <span></span>
          <span>
            <button class="view-orig-btn" onclick="window.open('${getTranslatedLink(article.link, false)}','_blank')">↗ Original site</button>
            <button class="view-orig-btn btn-unsave" data-link="${article.link}" style="margin-left:12px;">Remove</button>
          </span>
        </div>
      `;
      savedGrid.appendChild(feedItem);
    });
  }

          <div class="grid" id="${safeId}">
            <p class="loading">Loading latest content...</p>
          </div>
        `;
        
        sectionEl.appendChild(feedSection);
        const grid = document.getElementById(safeId);

        fetch(rss2jsonUrl + encodeURIComponent(feed.url))
          .then(response => response.json())
          .then(data => {
            grid.innerHTML = '';

            if (data.status !== 'ok') {
              grid.innerHTML = '<p>Failed to load feed. The publisher may have restricted access.</p>';
              return;
            }

            // Filter out rss2json injected ad/promo items for YouTube feeds (they don't link to youtube.com)
            const validItems = feed.isYoutube
              ? data.items.filter(item => item.link && item.link.includes('youtube.com'))
              : data.items;
            const unreadItems = validItems.filter(item => !readArticles.includes(item.link));
            unreadItems.sort(function(a, b) {
              return new Date(b.pubDate) - new Date(a.pubDate);
            });

            if (unreadItems.length === 0) {
               grid.innerHTML = '<p>You are all caught up! No new articles right now.</p>';
               return;
            }

            feedPageState[safeId] = { items: unreadItems, displayed: 0, feed: feed };
            renderFeedBatch(grid, safeId);
          })
          .catch(error => {
            grid.innerHTML = '<p>Error fetching data. Check your network connection.</p>';
          });
      });
    });
  }

  function getTranslatedLink(link, isYoutube) {
    if (isYoutube) return link;
    const lang = document.getElementById('lang-select').value;
    const tl = lang === 'hindi' ? 'hi' : lang === 'marathi' ? 'mr' : 'en';
    return 'https://translate.google.com/translate?sl=auto&tl=' + tl + '&u=' + encodeURIComponent(link);
  }

  function renderFeedBatch(grid, stateKey) {
    var state = feedPageState[stateKey];
    if (!state) return;
    var items = state.items;
    var displayed = state.displayed;
    var feed = state.feed;
    var batch = items.slice(displayed, displayed + BATCH_SIZE);
    if (!batch.length) {
      grid.innerHTML = '<p style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;text-align:center;padding:20px 0;">All caught up! No more articles.</p>';
      return;
    }
    var frag = document.createDocumentFragment();
    batch.forEach(function(item) {
      var tempDiv = document.createElement("div");
      tempDiv.innerHTML = item.description;
      var cleanText = tempDiv.textContent || tempDiv.innerText || "";
      var words = cleanText.trim().split(/\s+/).filter(function(w) { return w.length > 0; });
      var summary = "";
      if (words.length <= 500) {
        summary = words.join(" ");
      } else {
        var sentences = cleanText.match(/[^.!?]*[.!?]+/g) || [cleanText];
        var kept = [], count = 0;
        for (var si = 0; si < sentences.length; si++) {
          var sw = sentences[si].trim().split(/\s+/).filter(function(w) { return w.length > 0; });
          if (count + sw.length > 500) break;
          kept.push(sentences[si].trim());
          count += sw.length;
        }
        summary = kept.join(" ");
      }
      if (summary.trim() === "") {
        summary = "Tap below to view the full text or video directly from the source.";
      }
      var timeAgo = '';
      if (item.pubDate) {
        var pubDate = new Date(item.pubDate);
        var now = new Date();
        var diffMs = now - pubDate;
        var diffHours = Math.floor(diffMs / (1000 * 60 * 60));
        var diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        if (diffHours < 1) timeAgo = 'Just now';
        else if (diffHours < 24) timeAgo = diffHours + 'h ago';
        else timeAgo = diffDays + 'd ago';
      }
      var feedItem = document.createElement('div');
      feedItem.className = 'feed-item';
      feedItem.setAttribute('data-link', item.link);
      var safeTitle = item.title.replace(/"/g, '&quot;');
      var ytAttr = feed.isYoutube ? ' data-isyoutube="true"' : '';
      feedItem.innerHTML =
        '<span class="headline reader-trigger" data-url="' + item.link + '" data-title="' + safeTitle + '" data-feed="' + feed.name + '" data-date="' + (item.pubDate || '') + '"' + ytAttr + '>' + item.title + '</span>' +
        '<p class="description">' + summary + '</p>' +
        '<div class="meta">' +
          '<span>' + timeAgo + ' — ' + feed.name + '</span>' +
          '<button class="view-orig-btn" onclick="window.open(\'' + getTranslatedLink(item.link, feed.isYoutube) + '\',\'_blank\')">↗ Original site</button>' +
        '</div>';
      frag.appendChild(feedItem);
    });
    grid.appendChild(frag);
    var newDisplayed = displayed + batch.length;
    var remaining = items.length - newDisplayed;
    state.displayed = newDisplayed;
    var oldWrap = grid.querySelector('.load-more-wrap');
    if (oldWrap) oldWrap.remove();
    var wrap = document.createElement('div');
    wrap.className = 'load-more-wrap';
    if (remaining > 0) {
      var btn = document.createElement('button');
      btn.className = 'load-more-btn';
      btn.setAttribute('data-statekey', stateKey);
      btn.innerHTML = '↓ Load more <span style="opacity:0.6;font-weight:400;">(clears read · ' + remaining + ' remaining)</span>';
      wrap.appendChild(btn);
    } else {
      var indicator = document.createElement('div');
      indicator.className = 'load-more-indicator';
      indicator.setAttribute('data-statekey', stateKey);
      indicator.innerHTML = '✓ All caught up · <span style="text-decoration:underline;">clear read</span>';
      wrap.appendChild(indicator);
    }
    grid.appendChild(wrap);
  }

  // Load-more / clear-read click handler
  document.addEventListener('click', function(e) {
    if (!e.target.closest) return;
    var trigger = e.target.closest('.load-more-btn, .load-more-indicator');
    if (!trigger) return;
    var stateKey = trigger.getAttribute('data-statekey');
    var state = feedPageState[stateKey];
    if (!state) return;
    var grid = document.getElementById(stateKey);

    var items = grid.querySelectorAll('.feed-item');

    localStorage.setItem('readArticles', JSON.stringify(readArticles));
    grid.innerHTML = '';
    renderFeedBatch(grid, stateKey);
  });

  const READER_TIMEOUT_MS = 5000;

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;

  function xhrFetch(url, timeoutMs) {
    return new Promise(function(resolve, reject) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = timeoutMs || READER_TIMEOUT_MS;
      xhr.setRequestHeader('Accept', 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8');
      xhr.onload = function() { resolve(xhr.responseText); };
      xhr.onerror = function() { reject(new Error('XHR failed')); };
      xhr.ontimeout = function() { reject(new Error('Timeout')); };
      xhr.send();
    });
  }

  // Extremely robust regex that catches almost any variation of a YouTube URL
  function getYoutubeVideoId(url) {
    if (!url) return null;
    var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|shorts\/|live\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    var match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
  }


  // ==========================================
  // AD-FREE VIDEO PLAYER (Invidious / Piped fallback chain)
  // ==========================================
  // Public instances — ordered by reliability.
  // If one fails (iframe error / blocked), the next is tried automatically.
  var ADFREE_INSTANCES = [
    { name: 'Invidious (yt.cdaut.de)',   embedBase: 'https://yt.cdaut.de/embed/'         },
    { name: 'Invidious (invidious.nerdvpn.de)', embedBase: 'https://invidious.nerdvpn.de/embed/' },
    { name: 'Piped (piped.video)',        embedBase: 'https://piped.video/embed/'         },
    { name: 'Piped (watch.whatever.social)', embedBase: 'https://watch.whatever.social/embed/' },
    { name: 'YouTube (fallback)',         embedBase: 'https://www.youtube.com/embed/'     }
  ];

  var _currentVid = null;
  var _currentInstanceIdx = 0;

  function buildEmbedSrc(instanceIdx, vid, params) {
    var base = ADFREE_INSTANCES[instanceIdx].embedBase;
    return base + vid + (params || '?rel=0&autoplay=1&playsinline=1');
  }

  function tryNextInstance() {
    _currentInstanceIdx++;
    if (_currentInstanceIdx >= ADFREE_INSTANCES.length) {
      // All instances exhausted — show open-in-app message
      var statusEl = document.getElementById('player-status');
      if (statusEl) statusEl.textContent = 'All players failed. Please use Open in YouTube App below.';
      return;
    }
    var iframe = document.getElementById('adfree-iframe');
    var statusEl = document.getElementById('player-status');
    if (iframe) {
      var inst = ADFREE_INSTANCES[_currentInstanceIdx];
      if (statusEl) statusEl.textContent = 'Trying: ' + inst.name + '...';
      iframe.src = buildEmbedSrc(_currentInstanceIdx, _currentVid, '?rel=0&autoplay=1&playsinline=1');
    }
  }

  function renderAdFreePlayer(vid, title, url) {
    _currentVid = vid;
    _currentInstanceIdx = 0;
    var src = buildEmbedSrc(0, vid, '?rel=0&autoplay=1&playsinline=1');

    // Clean video-only view — back button is the floating pill already on screen
    var html =
      '<div class="reader-video-wrap">' +
        '<iframe id="adfree-iframe" class="reader-video-embed"' +
        ' src="' + src + '"' +
        ' frameborder="0"' +
        ' allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"' +
        ' allowfullscreen' +
        ' referrerpolicy="no-referrer">' +
        '</iframe>' +
      '</div>' +

      '<div id="player-status-bar" style="background:#1a1a1a;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;">' +
        '<span id="player-status" style="font-size:9px;color:#e9c46a;font-family:monospace;letter-spacing:0.06em;">▶ ad-free</span>' +
        '<button onclick="tryNextInstance()" style="background:none;border:1px solid #e9c46a;color:#e9c46a;padding:3px 10px;font-size:10px;cursor:pointer;">⟳ try next</button>' +
      '</div>';

    return html;
  }

  function fetchArticleLocal(url, title, feedName, pubDate) {
    var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
    var fallbackUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);

    function tryFetch(primary, secondary) {
      xhrFetch(primary, READER_TIMEOUT_MS).then(function(html) {
        var extracted = extractWebArticle(html, url);
        if (extracted && extracted.length > 300) {
          renderArticleContent(extracted, title, feedName, pubDate, url);
        } else {
          throw new Error('Content too short');
        }
      }).catch(function() {
        if (secondary) {
          tryFetch(secondary, null);
        } else {
          renderArticleFallback(url, title, feedName, pubDate);
        }
      });
    }

    tryFetch(proxyUrl, fallbackUrl);
  }

  function extractWebArticle(html, baseUrl) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var article = extractMainContent(doc, baseUrl, false);
    if (!article || article.length < 300) {
      article = extractMainContent(doc, baseUrl, true);
    }
    return article;
  }

  function extractMainContent(doc, baseUrl, aggressive) {
    var selectors = [
      'article[class*="article"]', 'article[class*="story"]', 'article[class*="post"]',
      'article[class*="content"]', 'article[class*="main"]', 'article[class*="single"]',
      'article[class*="entry"]',
      '[class*="article-body"]', '[class*="story-body"]', '[class*="post-content"]',
      '[class*="entry-content"]', '[class*="article-content"]', '[class*="article__content"]',
      '[class*="article_text"]', '[class*="story-text"]', '[class*="article-detail"]',
      '[class*="main-content"]', '[class*="content-main"]', '[class*="field-item"]',
      '[class*="article-full"]', '[class*="full-article"]',
      '[property="articleBody"]', '[itemprop="articleBody"]',
      'main', '[role="main"]', '.main-content', '#main-content',
      '.post-body', '.entry-body', '.articleBody',
      '.field--name-body', '.field-name-body',
      'body'
    ];

    for (var i = 0; i < selectors.length; i++) {
      var el = doc.querySelector(selectors[i]);
      if (el) {
        var clone = sanitizeHtml(el.cloneNode(true));
        if (clone.textContent.trim().length > 300) {
          return reflowArticleText(clone.innerHTML, baseUrl);
        }
      }
    }
    return null;
  }

  function sanitizeHtml(node) {
    var removeSelectors = [
      'script', 'style', 'noscript', 'iframe', 'nav', 'header', 'footer',
      '.ad', '.ads', '.adsense', '.advertisement', '.ad-container',
      '[class*="ad-"]', '[class*="ad_"]', '[id*="ad-"]', '[id*="ad_"]',
      '.social', '.share', '.social-share', '.sharing', '.social-links',
      '.related', '.related-posts', '.recommended', '.recommendations',
      '.comments', '#comments', '.comment', '.comment-form',
      '.sidebar', '#sidebar', '.widget', '.widget-area',
      '.newsletter', '.subscribe', '.signup', '.mailchimp',
      '.cookie', '.cookies', '.consent', '.gdpr',
      '.popup', '.modal', '.overlay', '.lightbox',
      '.nav', '.navigation', '.menu', '.navbar', '.header',
      '.footer', '.site-footer', '.page-footer',
      '.breadcrumb', '.breadcrumbs', '.pagination',
      '.author', '.byline', '.meta', '.post-meta', '.entry-meta',
      '.tags', '.categories', '.tag-list',
      '.published', '.updated', '.date',
      '.video', '.video-container', '.embed',
      '.gallery', '.carousel', '.slider',
      '.hidden', '.visually-hidden', '.screen-reader-text'
    ];

    for (var i = 0; i < removeSelectors.length; i++) {
      try {
        var els = node.querySelectorAll(removeSelectors[i]);
        for (var j = 0; j < els.length; j++) {
          els[j].remove();
        }
      } catch(e) {}
    }

    removeEmptyNodes(node);
    return node;
  }

  function removeEmptyNodes(node) {
    var children = Array.from(node.childNodes);
    for (var i = 0; i < children.length; i++) {
      var child = children[i];
      if (child.nodeType === 1) {
        removeEmptyNodes(child);
        if (!child.textContent.trim() && child.children.length === 0) {
          child.remove();
        }
      }
    }
  }

  function reflowArticleText(html, baseUrl) {
    var temp = document.createElement('div');
    temp.innerHTML = html;
    var blocks = [];

    function walk(n) {
      if (n.nodeType === 3) {
        var t = n.textContent.trim();
        if (t) blocks.push(t);
      } else if (n.nodeType === 1) {
        var tag = n.tagName.toLowerCase();
        if (['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'blockquote', 'li', 'figcaption'].indexOf(tag) !== -1) {
          var inner = n.innerHTML.trim();
          if (inner) blocks.push('<' + tag + '>' + inner + '</' + tag + '>');
        } else if (['img', 'figure', 'picture', 'table', 'pre', 'code'].indexOf(tag) !== -1) {
          blocks.push(n.outerHTML);
        } else {
          var t2 = n.textContent.trim();
          if (t2) blocks.push(t2);
        }
      }
    }

    Array.from(temp.childNodes).forEach(walk);
    return blocks.join('\n\n');
  }

  function renderArticleContent(articleHtml, title, feedName, pubDate, url) {
    var content = document.getElementById('reader-content');
    var metaParts = [];
    if (feedName) metaParts.push(feedName);
    if (pubDate) {
      try {
        var d = new Date(pubDate);
        metaParts.push(d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }));
      } catch(e) {}
    }
    var safeTitle = escapeHtml(title);
    _readerFontSize = 17;
    content.innerHTML =
      '<h1 class="reader-article-title">' + safeTitle + '</h1>' +
      '<div class="reader-article-meta">' + metaParts.join(' &middot; ') + '</div>' +
      '<div class="reader-body" style="--reader-font-sz:17px">' + articleHtml + '</div>';
  }

  function renderArticleFallback(url, title, feedName, pubDate) {
    var content = document.getElementById('reader-content');
    var link = getTranslatedLink(url, false);
    var safeTitle = escapeHtml(title);
    content.innerHTML =
      '<div class="reader-status">' +
      'Could not extract article content automatically.<br><br>' +
      '<strong>' + safeTitle + '</strong><br><br>' +
      '<a href="' + link + '" target="_blank" style="text-decoration:underline;font-weight:bold;color:#000000;">View original article &rarr;</a>' +
      '</div>';
  }

  function setReaderProgress() {
    var scrollEl = document.getElementById('reader-scroll');
    var progress = document.getElementById('reader-progress');
    var pct = (scrollEl.scrollTop / (scrollEl.scrollHeight - scrollEl.clientHeight)) * 100;
    progress.style.width = Math.min(100, Math.max(0, pct)) + '%';
  }

  // --- Reader event wiring ---
  document.addEventListener('click', function(e) {
    var trigger = e.target.closest('.reader-trigger');
    if (trigger) {
      var url = trigger.getAttribute('data-url');
      if (url) {
        openReader(url, trigger.getAttribute('data-title'), trigger.getAttribute('data-feed'), trigger.getAttribute('data-date'), trigger.getAttribute('data-isyoutube') === 'true');
      }
    }
  });

  document.getElementById('reader-close-btn').addEventListener('click', closeReader);
  document.getElementById('reader-backdrop').addEventListener('click', closeReader);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeReader();
  });

  document.getElementById('reader-font-dec').addEventListener('click', function() {
    _readerFontSize = Math.max(13, _readerFontSize - 1);
    var body = document.querySelector('.reader-body');
    if (body) body.style.setProperty('--reader-font-sz', _readerFontSize + 'px');
  });

  document.getElementById('reader-font-inc').addEventListener('click', function() {
    _readerFontSize = Math.min(24, _readerFontSize + 1);
    var body = document.querySelector('.reader-body');
    if (body) body.style.setProperty('--reader-font-sz', _readerFontSize + 'px');
  });

  document.getElementById('reader-scroll').addEventListener('scroll', setReaderProgress);
</script>

<script id="sw-src" type="text/plain">
const CACHE = 'khichdi-v1';
const OFFLINE_URL = './';
self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c => c.addAll([OFFLINE_URL]).catch(() => {}))); });
self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => self.clients.claim())); });
self.addEventListener('fetch', e => { const u = e.request.url; if (e.request.method !== 'GET' || u.startsWith('chrome-extension') || u.startsWith('data:')) return; if (u.includes('allorigins') || u.includes('googleapis') || u.includes('cdnjs') || u.includes('fonts.googleapis') || u.includes('fonts.gstatic')) { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); return; } e.respondWith(caches.match(e.request).then(cached => { if (cached) return cached; return fetch(e.request).then(resp => { if (resp && resp.status === 200 && resp.type !== 'opaque') caches.open(CACHE).then(c => c.put(e.request, resp.clone())); return resp; }).catch(() => caches.match(OFFLINE_URL)); })); });
</script>
